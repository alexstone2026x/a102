<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
font-family:Inter,sans-serif;
background:#ffffff;
color:#000000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
width:450px;
padding:30px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h1{
font-size:22px;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:8px;
font-family:Inter;
}

button{
width:100%;
padding:12px;
background:#333;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:5px;
}

button:hover{
background:#111;
}

.result{
margin-top:20px;
color:#333;
line-height:1.4;
white-space:pre-line;
}

.footer{
margin-top:25px;
border-top:1px solid #eee;
padding-top:15px;
font-size:13px;
color:#666;
}
</style>
</head>

<body>

<div class="card">

<h1>Product Description Generator</h1>

<input id="name" placeholder="Product name">

<textarea id="details" placeholder="Product details"></textarea>

<button onclick="generate()">Generate</button>

<div class="result" id="result"></div>

<button onclick="copyText()">Copy</button>

<div class="footer">
How it works<br>
1 Enter product<br>
2 Generate<br>
3 Copy
</div>

</div>

<script>

function generate(){
let name=document.getElementById("name").value;
let details=document.getElementById("details").value;

let text=name + "\n\n" +
details + "\n\n" +
"High quality product designed for everyday use.\n" +
"Simple, clean and reliable.\n" +
"Perfect for modern customers.\n" +
"Available now.";

document.getElementById("result").innerText=text;
}

function copyText(){
let text=document.getElementById("result").innerText;
navigator.clipboard.writeText(text);
}

</script>

</body>
</html>
